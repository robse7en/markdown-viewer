name: Release

# Push a version tag (e.g. v1.0.0) to build the installer and publish a
# GitHub Release with MarkdownViewer-Setup-<version>.exe attached.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v, e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
              $v = $env:GITHUB_REF -replace "refs/tags/v", ""
          } else {
              $v = "${{ github.event.inputs.version }}"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish app
        run: >
          dotnet publish MarkdownViewer.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: >
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          "/DMyAppVersion=${{ steps.ver.outputs.version }}"
          installer\MarkdownViewer.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MarkdownViewer-Setup
          path: dist/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
